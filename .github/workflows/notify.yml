name: social-notifier

# Social alerts now run inside Gio Bot on Render (reliable 3-minute timer).
# GitHub's scheduled crons are throttled to roughly hourly on free repos, which
# made alerts late. Kept here as a manual-only backup — no schedule, so it can
# never double-post alongside the bot.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notifier
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check socials and notify
        run: node check.mjs
        env:
          WEBHOOK_TIKTOK: ${{ secrets.WEBHOOK_TIKTOK }}
          WEBHOOK_LIVE: ${{ secrets.WEBHOOK_LIVE }}
          WEBHOOK_YOUTUBE: ${{ secrets.WEBHOOK_YOUTUBE }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      - name: Persist state
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "gio-notifier"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "state: update last-seen"
            git pull --rebase
            git push
          fi
