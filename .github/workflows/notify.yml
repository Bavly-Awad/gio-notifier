name: social-notifier

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notifier
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check socials and notify
        run: node check.mjs
        env:
          WEBHOOK_TIKTOK: ${{ secrets.WEBHOOK_TIKTOK }}
          WEBHOOK_LIVE: ${{ secrets.WEBHOOK_LIVE }}
          WEBHOOK_YOUTUBE: ${{ secrets.WEBHOOK_YOUTUBE }}
      - name: Persist state
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "gio-notifier"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "state: update last-seen"
            git pull --rebase
            git push
          fi
