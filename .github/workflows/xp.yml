name: daily-xp

on:
  schedule:
    - cron: "30 4 * * *" # daily 04:30 UTC (~12:30am Toronto)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: xp
  cancel-in-progress: false

jobs:
  xp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node xp.mjs
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      - run: |
          git config user.name "gio-notifier"
          git config user.email "actions@users.noreply.github.com"
          git add xp.json
          git diff --cached --quiet || git commit -m "xp: daily update"
          git pull --rebase
          git push
