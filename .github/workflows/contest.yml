name: clip-of-the-week

on:
  schedule:
    - cron: "0 18 * * 5" # Fridays 18:00 UTC (2pm Toronto)
  workflow_dispatch:

jobs:
  contest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node contest.mjs
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
